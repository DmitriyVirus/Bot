<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Работа SmartComp — Смена А</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #f5f4f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
    }

    .wrap {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0ddd6;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      align-self: center;
    }

    .card-header { margin-bottom: 1.25rem; }
    .card-title { font-size: 17px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.01em; margin-bottom: 4px; }
    .card-sub   { font-size: 12px; color: #999; }

    .divider { height: 1px; background: #f0ede8; margin-bottom: 1.25rem; }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      width: 100%;
      height: 44px;
      border: 1px solid #e0ddd6; border-radius: 10px;
      padding: 0 14px; font-size: 16px; color: #1a1a1a;
      background: #fafaf8; outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    input[type="text"]:focus { border-color: #aaa; background: #fff; }
    input[type="text"]::placeholder { color: #c0bdb8; }

    button {
      width: 100%;
      height: 44px;
      border: none; border-radius: 10px;
      background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: background 0.12s, transform 0.08s;
    }
    button:hover  { background: #333; }
    button:active { transform: scale(0.97); }

    .result {
      background: #fafaf8; border: 1px solid #e8e5e0; border-radius: 12px;
      padding: 1rem 1.25rem; min-height: 84px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .res-idle        { font-size: 13px; color: #bbb; }
    .res-date-label  { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .res-date-full   { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; letter-spacing: -0.02em; }
    .res-weekday     { font-size: 13px; color: #888; margin-bottom: 12px; }
    .badge           { display: inline-block; font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px; }
    .badge-work      { background: #e8f5e0; color: #3a7a1a; }
    .badge-off       { background: #f0ede8; color: #6a6660; }
    .error-text      { font-size: 13px; color: #c04040; }
    .hint            { margin-top: 10px; font-size: 11px; color: #bbb; text-align: center; }

    /* ── Calendars ── */
    .calendars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) {
      .calendars { grid-template-columns: 1fr; }
    }

    .cal-card {
      background: #ffffff;
      border: 1px solid #ccddf5;
      border-radius: 16px;
      padding: 1.25rem 1rem 1.5rem;
      box-shadow: 0 2px 12px rgba(30,100,200,0.07);
    }

    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .cal-month-name { font-size: 16px; font-weight: 600; color: #1a3a6a; }
    .cal-legend     { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #7a9ac0; }
    .legend-dot     { width: 8px; height: 8px; border-radius: 50%; background: #3a7adf; flex-shrink: 0; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-dow {
      text-align: center; font-size: 12px; font-weight: 600;
      color: #9ab0cc; padding-bottom: 6px;
    }
    .cal-dow.dow-sat { color: #c04040; }

    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border-radius: 8px;
    }

    .cal-day.empty   { background: transparent; }
    .cal-day.weekend { color: #c04040; }
    .cal-day.work    { background: #ddeeff; color: #1a4a9a; font-weight: 700; }
    .cal-day.work.weekend { background: #ddeeff; color: #b03090; font-weight: 700; }
    .cal-day.off     { background: #f4f8fd; }
    .cal-day.off.weekend { background: #f4f8fd; color: #c04040; }

    /* Past work — grey out, no strikethrough */
    .cal-day.past-work {
      background: #f0f4f8;
      color: #aabbd0;
      font-weight: 600;
    }
    .cal-day.past-work.weekend {
      background: #f0f4f8;
      color: #d0a0b0;
    }

    .cal-day.today {
      outline: 2px solid #3a7adf;
      outline-offset: -2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Работа SmartComp — Смена А</div>
        <div class="card-sub">График 2/2</div>
      </div>
      <div class="divider"></div>

      <div class="input-row">
        <input type="text" id="dateInput" placeholder="Дата" autocomplete="off" />
        <button onclick="check()">Проверить</button>
      </div>

      <div class="result" id="result">
        <span class="res-idle">Результат проверки</span>
      </div>

      <div class="hint">Допустимые форматы даты: дд.мм.гггг · дд.мм · дд</div>
    </div>

    <div class="calendars" id="calendars"></div>
  </div>

  <script>
    const WEEKDAYS_RU = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
    const MONTHS_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const MONTHS_GEN  = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const DOW_LABELS  = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

    function toMidnight(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function isWorkDay(target) {
      const anchor = toMidnight(new Date(2026, 3, 22));
      const t = toMidnight(target);
      const diff = Math.round((t - anchor) / 86400000);
      const cycle = ((diff % 4) + 4) % 4;
      return cycle === 0 || cycle === 1;
    }

    function parseDate(raw) {
      const s = raw.trim();
      const today = new Date();
      let m;
      m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
      m = s.match(/^(\d{1,2})\.(\d{1,2})$/);
      if (m) return new Date(today.getFullYear(), +m[2] - 1, +m[1]);
      m = s.match(/^(\d{1,2})$/);
      if (m) {
        const day = +m[1];
        if (day >= today.getDate()) return new Date(today.getFullYear(), today.getMonth(), day);
        const next = new Date(today.getFullYear(), today.getMonth() + 1, 1);
        return new Date(next.getFullYear(), next.getMonth(), day);
      }
      return null;
    }

    function check() {
      const raw = document.getElementById('dateInput').value;
      const box = document.getElementById('result');
      if (!raw.trim()) { box.innerHTML = '<span class="error-text">Введите дату</span>'; return; }
      const date = parseDate(raw);
      if (!date || isNaN(date)) {
        box.innerHTML = '<span class="error-text">Не могу распознать дату. Попробуй: 25.06.2026, 25.06 или 26</span>';
        return;
      }
      const work = isWorkDay(date);
      const wd = WEEKDAYS_RU[date.getDay()];
      const dateStr = date.getDate() + ' ' + MONTHS_GEN[date.getMonth()] + ' ' + date.getFullYear();
      const cap = wd.charAt(0).toUpperCase() + wd.slice(1);
      box.innerHTML = `
        <div class="res-date-label">Дата</div>
        <div class="res-date-full">${dateStr}</div>
        <div class="res-weekday">${cap}</div>
        <span class="badge ${work ? 'badge-work' : 'badge-off'}">${work ? 'Рабочий день' : 'Выходной'}</span>
      `;
    }

    document.getElementById('dateInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });

    function buildCalendar(year, month) {
      const todayMid = toMidnight(new Date());
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      let firstDow = new Date(year, month, 1).getDay();
      firstDow = (firstDow + 6) % 7;

      let html = `<div class="cal-card">
        <div class="cal-header">
          <span class="cal-month-name">${MONTHS_FULL[month]} ${year}</span>
          <span class="cal-legend"><span class="legend-dot"></span> Рабочий</span>
        </div>
        <div class="cal-grid">`;

      DOW_LABELS.forEach((d, i) => {
        const cls = i >= 5 ? ' dow-sat' : '';
        html += `<div class="cal-dow${cls}">${d}</div>`;
      });

      for (let i = 0; i < firstDow; i++) {
        html += `<div class="cal-day empty"></div>`;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const dow = date.getDay();
        const isWeekend = dow === 0 || dow === 6;
        const work = isWorkDay(date);
        const dateMid = toMidnight(date);
        const isToday = dateMid.getTime() === todayMid.getTime();
        const isPast  = dateMid < todayMid;

        let cls = 'cal-day';
        if (isWeekend) cls += ' weekend';
        if (work && isPast) cls += ' past-work';
        else if (work)      cls += ' work';
        else                cls += ' off';
        if (isToday) cls += ' today';

        html += `<div class="${cls}">${day}</div>`;
      }

      html += `</div></div>`;
      return html;
    }

    function renderCalendars() {
      const t = new Date();
      const y0 = t.getFullYear(), m0 = t.getMonth();
      const next = new Date(y0, m0 + 1, 1);
      document.getElementById('calendars').innerHTML =
        buildCalendar(y0, m0) + buildCalendar(next.getFullYear(), next.getMonth());
    }

    renderCalendars();
  </script>
</body>
</html>
